<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 我的新生活</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.jpg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ocr.js"></script>
    <style>
        :root { --p-border: 2px solid #000; --bg: #f4f1ea; }
        body { background: var(--bg); background-image: radial-gradient(#d1c7b7 1px, transparent 1px); background-size: 20px 20px; font-family: "PingFang SC", sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .stats-card { background: #fff; border: var(--p-border); padding: 15px; width: 100%; max-width: 400px; box-shadow: 4px 4px 0 #000; margin-bottom: 20px; text-align: center; }
        .stats-card h2 { margin: 0; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .stats-card h2::before { content: '🍓'; font-size: 24px; }
        .total-amount { font-size: 16px; color: #ff4757; font-weight: bold; }
        .month-name { font-size: 14px; color: #666; margin-top: 5px; }

        /* 照片墙样式 */
        .photo-grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 100px; }
        .grid-item { background: #fff; border: var(--p-border); padding: 8px; box-shadow: 2px 2px 0 #000; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
        .grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: var(--p-border); }
        .item-info { font-size: 11px; margin-top: 5px; text-align: center; line-height: 1.2; color: #333; }
        .item-amount { color: #ff4757; font-weight: bold; margin-top: 2px; }

        /* 浮动添加按钮 */
        .floating-add { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #000; color: #ffcc00; border-radius: 50%; border: var(--p-border); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 1000; box-shadow: 4px 4px 0 #000; }
        
        /* 上传面板 */
        #upload-panel { display: none; background: white; border: var(--p-border); padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 85%; max-width: 320px; box-shadow: 10px 10px 0 #000; }
        #upload-panel h3 { margin-top:0; display: flex; align-items: center; gap: 8px; justify-content: center; }
        #upload-panel h3::before { content: '✨'; }
        input[type="number"], input[type="text"], input[type="file"] { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ccc; font-family: inherit; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        .button-group button { flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; }

        /* 大图预览弹窗 */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #fff; border: var(--p-border); padding: 15px; max-width: 90%; max-height: 90%; box-shadow: 10px 10px 0 #000; position: relative; display: flex; flex-direction: column; }
        #modal-image { max-width: 100%; max-height: 70vh; object-fit: contain; border: var(--p-border); }
        #modal-date, #modal-amount, #modal-desc { margin-top: 10px; text-align: center; font-size: 14px; }
        #modal-amount { color: #ff4757; font-weight: bold; }
        .close-btn { position: absolute; top: -12px; right: -12px; width: 30px; height: 30px; background: #ff4757; color: white; border-radius: 50%; border: var(--p-border); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: 2px 2px 0 #000; }
        .delete-record-btn { background: #ff4757; color: #fff; border: var(--p-border); padding: 8px 15px; margin-top: 15px; cursor: pointer; font-weight: bold; }

        .ocr-loading {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="stats-card">
        <h2>我的新生活</h2>
        <div class="month-name">本月总支出</div>
        <div id="total-amount" class="total-amount">¥ 0.00</div>
    </div>

    <div id="photo-grid" class="photo-grid">
        <p style="text-align:center; color:#999; grid-column: 1/-1;">加载中... 🐾</p>
    </div>

    <div id="upload-panel">
        <h3>新的记录</h3>
        <input type="number" id="item-price" placeholder="金额 (可选)">
        <input type="text" id="img-desc" placeholder="写点心情...">
        <input type="file" id="file-input" accept="image/*" onchange="previewImageAndOCR()">
        <div style="font-size:12px; color:#666; margin-bottom:10px;">上传小票可自动识别金额 📸</div>
        <div class="button-group">
            <button id="submit-btn" style="background:#000; color:#fff;" onclick="handleUpload()">存入时光轴</button>
            <button onclick="document.getElementById('upload-panel').style.display='none'" style="background:none; border: 1px solid #ccc; color:#666;">取消</button>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">×</span>
            <img id="modal-image" src="">
            <div id="modal-date"></div>
            <div id="modal-amount"></div>
            <div id="modal-desc"></div>
            <button class="delete-record-btn" onclick="deleteEntryFromModal()">删除此记录</button>
        </div>
    </div>

    <div class="floating-add" onclick="document.getElementById('upload-panel').style.display='block'">+</div>

    <script>
        const SB_URL = 'https://cqnqeithtxwsribvkpdu.supabase.co';
        const SB_KEY = 'sb_publishable_rAGZrZ7_xj5BukT4OJwrXA_f4bogSrm';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentModalEntryId = null;

        async function fetchEntries() {
            const container = document.getElementById('photo-grid');
            const totalAmountDisplay = document.getElementById('total-amount');
            
            const { data, error } = await supabaseClient
                .from('journal_entries')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("加载数据失败:", error);
                container.innerHTML = '<p style="text-align:center; color:#ff4757; grid-column: 1/-1;">数据加载失败 💔</p>';
                return;
            }

            container.innerHTML = '';
            let monthlyTotal = 0;
            const currentMonth = new Date().toISOString().substring(0, 7);

            if (data && data.length > 0) {
                data.forEach(item => {
                    const entryDate = new Date(item.created_at);
                    const formattedDate = `${entryDate.getMonth() + 1}月${entryDate.getDate()}日`;
                    const formattedAmount = item.amount ? `¥${parseFloat(item.amount).toFixed(2)}` : '未记账';

                    if (item.created_at && item.created_at.startsWith(currentMonth)) {
                        monthlyTotal += parseFloat(item.amount || 0);
                    }

                    container.innerHTML += `
                        <div class="grid-item" onclick="openModal(${item.id})">
                            <img src="${item.image_url}">
                            <div class="item-info">${formattedDate}</div>
                            <div class="item-amount">${formattedAmount}</div>
                        </div>
                    `;
                });
                totalAmountDisplay.innerText = `¥ ${monthlyTotal.toFixed(2)}`;
            } else {
                container.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1/-1;">这里还没有记录呢，快来添加第一条吧！ 🐾</p>';
                totalAmountDisplay.innerText = '¥ 0.00';
            }
        }

        async function handleUpload() {
            const file = document.getElementById('file-input').files[0];
            const price = document.getElementById('item-price').value;
            const desc = document.getElementById('img-desc').value;
            
            if (!file) return alert('请选择一张图片！');

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = '上传中... <span class="ocr-loading"></span>';
            submitBtn.disabled = true;

            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { error: uploadError } = await supabaseClient.storage.from('photos').upload(fileName, file);
                if (uploadError) throw uploadError;

                const { data: publicUrlData } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                const { error: insertError } = await supabaseClient.from('journal_entries').insert([{ 
                    image_url: imageUrl, 
                    amount: price ? parseFloat(price) : 0, 
                    description: desc 
                }]);
                if (insertError) throw insertError;

                document.getElementById('upload-panel').style.display = 'none';
                document.getElementById('item-price').value = '';
                document.getElementById('img-desc').value = '';
                document.getElementById('file-input').value = ''; 
                fetchEntries();
            } catch (err) {
                alert('上传失败：' + err.message);
            } finally {
                submitBtn.innerHTML = '存入时光轴';
                submitBtn.disabled = false;
            }
        }

        async function openModal(entryId) {
            currentModalEntryId = entryId;
            const { data, error } = await supabaseClient.from('journal_entries').select('*').eq('id', entryId).single();
            if (error) return;

            const entryDate = new Date(data.created_at);
            document.getElementById('modal-image').src = data.image_url;
            document.getElementById('modal-date').innerText = `${entryDate.getFullYear()}年${entryDate.getMonth() + 1}月${entryDate.getDate()}日`;
            document.getElementById('modal-amount').innerText = data.amount ? `¥${parseFloat(data.amount).toFixed(2)}` : '未记账';
            document.getElementById('modal-desc').innerText = data.description || '这一天没写下文字 🐾';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            currentModalEntryId = null;
        }

        async function deleteEntryFromModal() {
            if (!currentModalEntryId || !confirm('确定要永久删除这条记录吗？')) return;
            try {
                const { error } = await supabaseClient.from('journal_entries').delete().eq('id', currentModalEntryId);
                if (error) throw error;
                closeModal();
                fetchEntries();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        async function previewImageAndOCR() {
            const fileInput = document.getElementById('file-input');
            const priceInput = document.getElementById('item-price');
            const submitBtn = document.getElementById('submit-btn');

            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadstart = () => {
                submitBtn.innerHTML = '识别中... <span class="ocr-loading"></span>';
                submitBtn.disabled = true;
            };

            reader.onload = async (e) => {
                const base64Image = e.target.result.split(',')[1];
                try {
                    // 调用 ocr.js 中的 performOCR 函数
                    const recognizedAmount = await performOCR(base64Image); 
                    if (recognizedAmount) {
                        priceInput.value = parseFloat(recognizedAmount).toFixed(2);
                    } else {
                        priceInput.placeholder = '未能自动识别金额，请手动输入';
                    }
                } catch (ocrError) {
                    console.error("OCR 识别失败:", ocrError);
                    priceInput.placeholder = 'OCR 识别失败，请手动输入';
                } finally {
                    submitBtn.innerHTML = '存入时光轴';
                    submitBtn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }
        
        fetchEntries();
    </script>
</body>
</html>
