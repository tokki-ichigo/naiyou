<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 像素时光生活轴</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.jpg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-border: 2px solid #000; --bg: #f4f1ea; }
        body { background: var(--bg); background-image: radial-gradient(#d1c7b7 1px, transparent 1px); background-size: 20px 20px; font-family: "PingFang SC", sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .stats-card { background: #fff; border: var(--p-border); padding: 15px; width: 100%; max-width: 400px; box-shadow: 4px 4px 0 #000; margin-bottom: 20px; text-align: center; }
        .timeline { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px; }
        .day-card { background: #fff; border: var(--p-border); padding: 15px; box-shadow: 6px 6px 0 #000; position: relative; }
        .date-tag { background: #000; color: #fff; padding: 2px 8px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
        .price-tag { float: right; color: #ff4757; font-weight: bold; }
        .entry-img { width: 100%; border: var(--p-border); aspect-ratio: 1/1; object-fit: cover; }
        .floating-add { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #000; color: #ffcc00; border-radius: 50%; border: var(--p-border); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 1000; box-shadow: 4px 4px 0 #000; }
        #upload-panel { display: none; background: white; border: var(--p-border); padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 85%; max-width: 320px; box-shadow: 10px 10px 0 #000; }
        input { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ccc; font-family: inherit; }
    </style>
</head>
<body>

    <div class="stats-card">
        <h2 style="margin:0; font-size:20px;">🍓 我的时光轴</h2>
        <div id="total-amount" style="font-size:14px; color:#666; margin-top:5px;">本月支出：¥ 0.00</div>
    </div>

    <div id="timeline" class="timeline"></div>

    <div id="upload-panel">
        <h3 style="margin-top:0;">存入瞬间 🐾</h3>
        <input type="number" id="amt" placeholder="花掉了多少钱？(可选)">
        <input type="text" id="desc" placeholder="写点心情...">
        <input type="file" id="file" accept="image/*">
        <button id="btn" style="width:100%; background:#000; color:#fff; padding:12px; border:none; cursor:pointer; font-weight:bold;" onclick="upload()">确认发布</button>
        <button onclick="document.getElementById('upload-panel').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">取消</button>
    </div>

    <div class="floating-add" onclick="document.getElementById('upload-panel').style.display='block'">+</div>

    <script>
        const SB_URL = 'https://cqnqeithtxwsribvkpdu.supabase.co';
        const SB_KEY = 'sb_publishable_rAGZrZ7_xj5BukT4OJwrXA_f4bogSrm';
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data } = await client.from('journal_entries').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('timeline');
            let total = 0; list.innerHTML = '';
            if (data) {
                data.forEach(i => {
                    const d = new Date(i.created_at);
                    const ds = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
                    if (i.amount) total += parseFloat(i.amount);
                    list.innerHTML += `<div class="day-card"><span class="date-tag">${ds}</span>${i.amount ? `<span class="price-tag">¥${i.amount}</span>` : ''}<img class="entry-img" src="${i.image_url}"><div style="margin-top:10px; font-size:14px;">${i.description || ''}</div></div>`;
                });
                document.getElementById('total-amount').innerText = `本月支出：¥ ${total.toFixed(2)}`;
            }
        }

        async function upload() {
            const f = document.getElementById('file').files[0];
            const a = document.getElementById('amt').value;
            const d = document.getElementById('desc').value;
            if (!f) return alert('拍张照记录今天吧！');
            const b = document.getElementById('btn'); b.innerText = "同步中..."; b.disabled = true;
            try {
                const path = `${Date.now()}_diary.jpg`;
                await client.storage.from('photos').upload(path, f);
                const { data: url } = client.storage.from('photos').getPublicUrl(path);
                await client.from('journal_entries').insert([{ image_url: url.publicUrl, amount: a || 0, description: d }]);
                location.reload();
            } catch (err) { alert('失败：' + err.message); b.disabled = false; }
        }
        load();
    </script>
</body>
</html>
